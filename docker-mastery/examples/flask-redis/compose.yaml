services:
  web:
    build: .
    ports:
      - "8000:5000"            # host:container
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: "redis:7-alpine"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
